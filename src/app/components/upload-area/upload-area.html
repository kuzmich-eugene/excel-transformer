<label
  for="invoice-upload"
  class="relative flex flex-col items-center justify-center w-full min-h-52 rounded-2xl border-2 border-dashed cursor-pointer transition-all duration-200 select-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-brand-primary"
  [class.border-brand-primary]="isDragOver()"
  [class.bg-brand-surface]="isDragOver()"
  [class.border-neutral-200]="!isDragOver()"
  [class.bg-neutral-50]="!isDragOver()"
  [class.opacity-60]="isLoading() === 'loading'"
  [class.pointer-events-none]="isLoading() === 'loading'"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
>
  @if (isDragOver()) {
    <svg class="w-12 h-12 text-brand-primary mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
    </svg>
    <span class="text-lg font-medium text-brand-primary">Drop to upload</span>
  } @else {
    <svg class="w-12 h-12 text-neutral-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m6.75 12-3-3m0 0-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
    </svg>
    <span class="text-base font-medium text-neutral-800">
      Drop your invoice <span class="text-brand-primary">.xls</span> file here
    </span>
    <span class="text-sm text-neutral-600 mt-1">or click to browse</span>
  }

  <input
    id="invoice-upload"
    type="file"
    accept=".xls"
    class="sr-only"
    aria-label="Upload invoice .xls file"
    [disabled]="isLoading() === 'loading'"
    (change)="onFileSelected($event)"
  />
</label>
